name: rails
type: service
from: ruby
fromVersionConstraint: "^1.0.0"
fromVersion: "1.1.1"
title: Ruby (Rails)
labels:
- rails
- ruby

env:
- name: SECRET_KEY_BASE
  value: '{{secret_key_base}}'
  secret: true
- name: RAILS_ENV
  value: development
  envType: dev
- name: RAILS_ENV
  value: production
  envType: prod
- name: RAILS_ENV
  value: production
  envType: staging
- name: RAILS_ENV
  value: production
  envType: test
- name: RAILS_ENV
  value: production
  envType: feature
links:
- name: redis
  title: Redis
  required: true
  env:
  - name: REDIS_URL
    value: 'redis://:{{link.tokens.password}}@{{link.host}}:{{link.port}}/0'
    secret: true
  selectors:
  - type: datastore
    labels:
    - redis
  - type: datastore
    labels:
    - valkey

configs:
- name: host-authorization
  title: Host authorization
  config: wodby_host_authorization.rb
  filepath: /usr/src/app/config/initializers/wodby_host_authorization.rb

tokens:
- name: secret_key_base
  generate:
    regex: '[0-9a-f]{64}'

derivatives:
- name: rails-sidekiq
  icon: sidekiq
  title: Sidekiq
  args: ['bundle', 'exec', 'sidekiq']
  type: service
  default: true
  required: false

build:
  dockerfile: Dockerfile
  connect: true
  boilerplates:
  - name: rails
    title: Rails boilerplate
    repo: https://github.com/wodby/rails-boilerplate
    branch: main

actions:
- name: database_migrate
  title: Prepare database
  args:
  - bundle
  - exec
  - rails
  - db:prepare
  type: post_deploy
- name: database_seed
  title: Seed database
  depends:
  - database_migrate
  args:
  - bundle
  - exec
  - rails
  - db:seed
  type: post_deploy_once
